<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/choicrew-mark.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Righteous&display=swap" rel="stylesheet" />
    <title>choicrew チョイクル</title>
  </head>
  
  <body>
    <div id="root"></div>
    <script>
      // 古いキャッシュによるJS読み込みエラー時、1回だけ自動リロード
      (function(){
        var key = '__choicrew_reload';
        window.addEventListener('error', function(e) {
          if (e.filename || (e.message && (
            e.message.indexOf('Failed to fetch dynamically imported module') !== -1 ||
            e.message.indexOf('Loading module') !== -1 ||
            e.message.indexOf('Loading chunk') !== -1 ||
            e.message.indexOf('chunk') !== -1 ||
            e.message.indexOf('Importing a module script failed') !== -1
          ))) {
            if (!sessionStorage.getItem(key)) {
              sessionStorage.setItem(key, '1');
              window.location.reload();
            }
          }
        }, true);
        // モジュール読み込み成功したらフラグクリア
        window.addEventListener('load', function() {
          sessionStorage.removeItem(key);
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx" onerror="
      if(!sessionStorage.getItem('__choicrew_reload')){
        sessionStorage.setItem('__choicrew_reload','1');
        location.reload();
      }
    "></script>
  </body>
</html>

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/svg+xml" href="/choicrew-mark.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Righteous&display=swap" rel="stylesheet" />
    <title>choicrew チョイクル</title>
  </head>
  
  <body>
    <div id="root"></div>
    <!-- 白画面フォールバック: アプリが5秒以内にマウントしなければ自動リカバリ -->
    <div id="__fallback" style="display:none;position:fixed;inset:0;z-index:9999;background:#f8fafc;justify-content:center;align-items:center;font-family:system-ui,sans-serif">
      <div style="text-align:center;padding:24px">
        <p style="font-size:16px;font-weight:600;color:#334155;margin-bottom:8px">読み込み中…</p>
        <p style="font-size:13px;color:#94a3b8;margin-bottom:20px">自動的に復旧します</p>
        <button onclick="hardReload()" style="background:#0d9488;color:#fff;border:none;border-radius:12px;padding:12px 32px;font-size:14px;font-weight:600;cursor:pointer">今すぐリロード</button>
      </div>
    </div>
    <script>
      // ハードリロード: キャッシュ全削除して強制リロード
      function hardReload() {
        sessionStorage.removeItem('__choicrew_reload');
        if ('caches' in window) {
          caches.keys().then(function(n){return Promise.all(n.map(function(k){return caches.delete(k)}))}).then(function(){
            location.href = location.pathname + '?_t=' + Date.now();
          });
        } else {
          location.href = location.pathname + '?_t=' + Date.now();
        }
      }
      // 5秒後にアプリがマウントされていなければフォールバック表示→自動リカバリ
      setTimeout(function(){
        var root = document.getElementById('root');
        if (!root || root.childNodes.length === 0) {
          var fb = document.getElementById('__fallback');
          if (fb) fb.style.display = 'flex';
          // さらに2秒待って自動リカバリ
          setTimeout(function(){ hardReload(); }, 2000);
        }
      }, 5000);
    </script>
    <script>
      // デプロイ後の古いチャンク404→白画面を防ぐ: 1回だけ自動リロード
      (function(){
        var key = '__choicrew_reload';
        function shouldReload(msg) {
          if (!msg) return false;
          var keywords = ['chunk', 'Failed to fetch dynamically imported module',
            'Loading module', 'Loading chunk', 'Importing a module script failed',
            'error loading dynamically imported module', 'NetworkError', 'fetch'];
          for (var i = 0; i < keywords.length; i++) {
            if (msg.toLowerCase().indexOf(keywords[i].toLowerCase()) !== -1) return true;
          }
          return false;
        }
        function doReload() {
          if (!sessionStorage.getItem(key)) {
            sessionStorage.setItem(key, '1');
            // キャッシュを飛ばしてリロード
            if ('caches' in window) {
              caches.keys().then(function(names) {
                return Promise.all(names.map(function(n) { return caches.delete(n); }));
              }).then(function() { location.reload(); });
            } else {
              location.reload();
            }
          }
        }
        // グローバルエラー（同期的な読み込み失敗）
        window.addEventListener('error', function(e) {
          if (shouldReload(e.message) || (e.filename && e.filename.indexOf('/assets/') !== -1)) {
            doReload();
          }
        }, true);
        // 動的import()の失敗はunhandledrejectionで飛ぶ
        window.addEventListener('unhandledrejection', function(e) {
          var msg = e.reason ? (e.reason.message || String(e.reason)) : '';
          if (shouldReload(msg)) {
            e.preventDefault();
            doReload();
          }
        });
        // 成功したらフラグクリア
        window.addEventListener('load', function() {
          sessionStorage.removeItem(key);
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx" onerror="
      if(!sessionStorage.getItem('__choicrew_reload')){
        sessionStorage.setItem('__choicrew_reload','1');
        if('caches' in window){caches.keys().then(function(n){return Promise.all(n.map(function(k){return caches.delete(k)}))}).then(function(){location.reload()})}else{location.reload()}
      }
    "></script>
  </body>
</html>
